<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1b5e20">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ProPlanter">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

<title>ProPlanter — Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Nunito',sans-serif;
  background:#07091a; color:#fff;
  min-height:100vh; padding:2rem 1rem 4rem;
  overflow-x:hidden;
}
body::before{
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 70% 50% at 15% 10%, rgba(92,52,212,0.2) 0%, transparent 60%),
    radial-gradient(ellipse 55% 45% at 85% 80%, rgba(27,94,32,0.18) 0%, transparent 60%);
}
.page{position:relative;z-index:1;max-width:900px;margin:0 auto;}

/* Back */
.back-btn{
  display:inline-flex;align-items:center;gap:6px;
  color:rgba(255,255,255,0.5);text-decoration:none;
  font-size:0.85rem;font-weight:800;
  border:1px solid rgba(255,255,255,0.12);
  padding:6px 14px;border-radius:20px;
  transition:all 0.2s;margin-bottom:2rem;
  background:rgba(255,255,255,0.04);
}
.back-btn:hover{color:#66bb6a;border-color:#66bb6a;}

/* Header */
.header{text-align:center;margin-bottom:2.5rem;}
.header-icon{font-size:3.5rem;display:block;margin-bottom:0.8rem;
  filter:drop-shadow(0 6px 16px rgba(249,168,37,0.4));}
.header h1{font-family:'Fredoka One',cursive;font-size:2.5rem;
  background:linear-gradient(135deg,#f9a825,#fff8e1);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header p{font-size:0.8rem;font-weight:800;color:rgba(255,255,255,0.35);
  letter-spacing:3px;text-transform:uppercase;margin-top:0.4rem;}

/* No data */
.no-data{
  text-align:center;padding:4rem 2rem;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;
}
.no-data .nd-icon{font-size:3rem;display:block;margin-bottom:0.8rem;opacity:0.5;}
.no-data p{color:rgba(255,255,255,0.4);font-weight:700;}

/* Stat cards row */
.stat-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:0.8rem;margin-bottom:1.5rem;
}
.stat-card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;padding:1.2rem 1rem;
  text-align:center;transition:transform 0.2s;
}
.stat-card:hover{transform:translateY(-3px);}
.sc-icon{font-size:2rem;display:block;margin-bottom:0.4rem;}
.sc-val{font-family:'Fredoka One',cursive;font-size:1.8rem;color:#f9a825;line-height:1;}
.sc-key{font-size:0.65rem;font-weight:900;color:rgba(255,255,255,0.4);
  letter-spacing:1.5px;text-transform:uppercase;margin-top:4px;}

/* Section */
.section{
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;padding:1.5rem;margin-bottom:1.2rem;
}
.section-title{
  font-family:'Fredoka One',cursive;font-size:1.2rem;color:#66bb6a;
  margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem;
}

/* Bar chart */
.bar-chart{display:flex;flex-direction:column;gap:0.6rem;}
.bar-row{display:flex;align-items:center;gap:0.8rem;}
.bar-label{font-size:0.78rem;font-weight:800;color:rgba(255,255,255,0.7);
  min-width:120px;text-align:right;}
.bar-track{flex:1;height:28px;background:rgba(255,255,255,0.06);
  border-radius:6px;overflow:hidden;position:relative;}
.bar-fill{height:100%;border-radius:6px;
  display:flex;align-items:center;padding-left:8px;
  font-size:0.72rem;font-weight:900;color:white;
  transition:width 1s cubic-bezier(0.4,0,0.2,1);
  min-width:30px;}

/* History table */
.hist-table{width:100%;border-collapse:collapse;}
.hist-table th{
  text-align:left;font-size:0.68rem;font-weight:900;
  color:rgba(255,255,255,0.4);letter-spacing:1px;
  text-transform:uppercase;padding:0.5rem 0.7rem;
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.hist-table td{
  padding:0.6rem 0.7rem;font-size:0.82rem;color:rgba(255,255,255,0.75);
  font-weight:700;border-bottom:1px solid rgba(255,255,255,0.05);
}
.hist-table tr:last-child td{border-bottom:none;}
.hist-table tr:hover td{background:rgba(255,255,255,0.04);}
.badge{
  display:inline-block;border-radius:20px;padding:2px 9px;
  font-size:0.65rem;font-weight:900;letter-spacing:0.5px;
}
.badge-easy  {background:rgba(46,125,50,0.25);color:#a5d6a7;}
.badge-medium{background:rgba(249,168,37,0.2);color:#ffd54f;}
.badge-hard  {background:rgba(183,28,28,0.25);color:#ef9a9a;}
.badge-tourn {background:rgba(106,27,154,0.25);color:#ce93d8;}

/* Buttons */
.action-btns{display:flex;gap:0.8rem;margin-top:1.5rem;}
.action-btn{
  flex:1;padding:0.9rem;border-radius:14px;border:none;
  font-family:'Fredoka One',cursive;font-size:1rem;
  cursor:pointer;transition:transform 0.18s;
}
.action-btn:hover{transform:translateY(-2px);}
.btn-play {background:linear-gradient(135deg,#43a047,#1b5e20);color:white;}
.btn-clear{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);
  border:1px solid rgba(255,255,255,0.15);}
.btn-clear:hover{background:rgba(229,57,53,0.2);color:#ef9a9a;border-color:rgba(229,57,53,0.4);}
</style>
</head>
<body>
<div class="page">
  <a href="index.html" class="back-btn">← Back to Home</a>

  <div class="header">
    <span class="header-icon">📊</span>
    <h1>Game Analytics</h1>
    <p>ProPlanter · All-Time Statistics</p>
  </div>

  <div id="content"></div>

  <div class="action-btns">
    <button class="action-btn btn-play" onclick="window.location.href='game.html'">🎮 Play Now</button>
    <button class="action-btn btn-clear" onclick="clearData()">🗑️ Clear All Data</button>
  </div>
</div>

<script>
function loadData() {
  return JSON.parse(localStorage.getItem('proplanter_lb') || '[]');
}

function clearData() {
  if (confirm('Clear ALL game history and analytics?')) {
    localStorage.removeItem('proplanter_lb');
    location.reload();
  }
}

function modeBadge(mode) {
  if (!mode) return '';
  var m = mode.toLowerCase();
  var cls = m.includes('easy') ? 'easy' :
            m.includes('hard') ? 'hard' :
            m.includes('tourn') ? 'tourn' : 'medium';
  return '<span class="badge badge-' + cls + '">' + mode.replace(/🟢|🟡|🔴|🏆/g,'').trim() + '</span>';
}

function render() {
  var data = loadData();
  var el   = document.getElementById('content');

  if (!data.length) {
    el.innerHTML =
      '<div class="no-data">' +
        '<span class="nd-icon">🌱</span>' +
        '<p>No games played yet!<br>Play a game to see your analytics here.</p>' +
      '</div>';
    return;
  }

  // ── Calculate stats ──
  var totalGames   = data.length;
  var totalTurns   = data.reduce(function(s,r){ return s + (r.turns||0); }, 0);
  var avgTurns     = Math.round(totalTurns / totalGames);
  var totalMoney   = data.reduce(function(s,r){ return s + (r.money||0); }, 0);
  var avgMoney     = Math.round(totalMoney / totalGames);
  var bestTurns    = Math.min.apply(null, data.map(function(r){ return r.turns||99; }));

  // Win counts per player
  var winCount = {};
  data.forEach(function(r) {
    winCount[r.winner] = (winCount[r.winner] || 0) + 1;
  });
  var topPlayer = Object.entries(winCount).sort(function(a,b){ return b[1]-a[1]; })[0];

  // Mode breakdown
  var modeCnt = {};
  data.forEach(function(r) {
    var m = (r.mode||'Medium').replace(/🟢|🟡|🔴|🏆/g,'').trim();
    modeCnt[m] = (modeCnt[m] || 0) + 1;
  });

  // Tile wins
  var tileCnt = {};
  data.forEach(function(r) {
    var t = r.tile || '?';
    tileCnt[t] = (tileCnt[t] || 0) + 1;
  });
  var favTile = Object.entries(tileCnt).sort(function(a,b){ return b[1]-a[1]; })[0];

  // ── Render ──
  var html = '';

  // Summary cards
  html += '<div class="stat-grid">';
  html += statCard('🎮', totalGames, 'Games Played');
  html += statCard('🎲', avgTurns, 'Avg Turns to Win');
  html += statCard('⚡', bestTurns, 'Best (Fewest Turns)');
  html += statCard('💰', '₹' + avgMoney, 'Avg Money Left');
  html += statCard('🏆', topPlayer ? topPlayer[0] : '—', 'Most Wins');
  html += statCard('🌧️', favTile ? 'Tile ' + favTile[0] : '—', 'Favourite Win Tile');
  html += '</div>';

  // Win leaderboard
  html += '<div class="section">';
  html += '<div class="section-title"><span>🥇</span> Win Leaderboard</div>';
  html += '<div class="bar-chart">';
  var maxWins = Math.max.apply(null, Object.values(winCount));
  var colors = ['#f9a825','#1e88e5','#43a047','#9c27b0','#e53935'];
  Object.entries(winCount).sort(function(a,b){return b[1]-a[1];}).forEach(function(entry,i) {
    var pct = Math.round((entry[1] / maxWins) * 100);
    html +=
      '<div class="bar-row">' +
        '<div class="bar-label">' + entry[0] + '</div>' +
        '<div class="bar-track">' +
          '<div class="bar-fill" style="width:' + pct + '%;background:' + (colors[i%colors.length]) + '">' +
            entry[1] + ' win' + (entry[1]>1?'s':'') +
          '</div>' +
        '</div>' +
      '</div>';
  });
  html += '</div></div>';

  // Mode popularity
  html += '<div class="section">';
  html += '<div class="section-title"><span>⚖️</span> Mode Popularity</div>';
  html += '<div class="bar-chart">';
  var modeColors = {'Easy':'#43a047','Medium':'#f9a825','Hard':'#e53935','Tournament':'#9c27b0'};
  var maxMode = Math.max.apply(null, Object.values(modeCnt));
  Object.entries(modeCnt).sort(function(a,b){return b[1]-a[1];}).forEach(function(entry) {
    var pct = Math.round((entry[1] / maxMode) * 100);
    var col = modeColors[entry[0]] || '#66bb6a';
    html +=
      '<div class="bar-row">' +
        '<div class="bar-label">' + entry[0] + '</div>' +
        '<div class="bar-track">' +
          '<div class="bar-fill" style="width:' + pct + '%;background:' + col + '">' +
            entry[1] + ' game' + (entry[1]>1?'s':'') +
          '</div>' +
        '</div>' +
      '</div>';
  });
  html += '</div></div>';

  // Game history table
  html += '<div class="section">';
  html += '<div class="section-title"><span>📋</span> Full Game History</div>';
  html += '<div style="overflow-x:auto">';
  html += '<table class="hist-table">';
  html += '<thead><tr><th>#</th><th>Winner</th><th>vs</th><th>Mode</th><th>Turns</th><th>Money Left</th><th>Win Tile</th><th>Date</th></tr></thead>';
  html += '<tbody>';
  data.forEach(function(r, i) {
    var medals = ['🥇','🥈','🥉'];
    html +=
      '<tr>' +
        '<td>' + (medals[i] || (i+1)) + '</td>' +
        '<td><strong>' + (r.avatar||'') + ' ' + (r.winner||'?') + '</strong></td>' +
        '<td style="color:rgba(255,255,255,0.45)">' + (r.opponent||'?') + '</td>' +
        '<td>' + modeBadge(r.mode||'Medium') + '</td>' +
        '<td>' + (r.turns||'?') + '</td>' +
        '<td style="color:#ffd54f">₹' + (r.money||0) + '</td>' +
        '<td>🌧️ Tile ' + (r.tile||'?') + '</td>' +
        '<td style="color:rgba(255,255,255,0.4)">' + (r.date||'') + '</td>' +
      '</tr>';
  });
  html += '</tbody></table>';
  html += '</div></div>';

  el.innerHTML = html;

  // Animate bars
  setTimeout(function() {
    document.querySelectorAll('.bar-fill').forEach(function(b) {
      var w = b.style.width;
      b.style.width = '0';
      setTimeout(function() { b.style.width = w; }, 100);
    });
  }, 100);
}

function statCard(icon, val, key) {
  return '<div class="stat-card">' +
    '<span class="sc-icon">' + icon + '</span>' +
    '<div class="sc-val">' + val + '</div>' +
    '<div class="sc-key">' + key + '</div>' +
  '</div>';
}

render();
</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("/sw.js")
      .then(function(reg) { console.log("ProPlanter SW registered"); })
      .catch(function(err) { console.log("SW error:", err); });
  });
}
</script>
</body>
</html>
