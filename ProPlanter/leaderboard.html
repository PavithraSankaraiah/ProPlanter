<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProPlanter — Leaderboard</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/leaderboard.css">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="lb-container">
  <div class="lb-header">
    <span class="lb-trophy">🏆</span>
    <h1 class="lb-title">Hall of Fame</h1>
    <p class="lb-sub">PROPLANTER CHAMPIONS</p>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat-card">
      <div class="stat-val" id="statGames">0</div>
      <div class="stat-label">GAMES PLAYED</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statTop">—</div>
      <div class="stat-label">TOP WINNER</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statAvg">—</div>
      <div class="stat-label">AVG TURNS</div>
    </div>
  </div>

  <div class="lb-entries" id="lbEntries">
    <div class="lb-empty">
      <span class="em-icon">🌱</span>
      No champions yet! Play a game to appear here.
    </div>
  </div>

  <div class="lb-btns">
    <button class="btn-lb play" onclick="window.location.href='game.html'">🎮 Play Now</button>
    <button class="btn-lb home" onclick="window.location.href='index.html'">🏠 Home</button>
    <button class="btn-lb clear" onclick="clearBoard()">🗑️ Clear</button>
  </div>
</div>
<script src="js/leaderboard.js"></script>
</body>
</html>
